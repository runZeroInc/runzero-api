    NetworkInterfaces_inner:
      properties:
        ipv4Addresses:
          description: Represents IPV4 addresses. Addresses are ordered from most
            to least likely to uniquely identify the asset.
          items:
            format: ipv4
            type: string
          maxItems: 256
          type: array
        ipv6Addresses:
          description: Represents the IPV6 addresses. Addresses are ordered from most
            to least likely to uniquely identify the asset.
          items:
            format: ipv6
            type: string
          maxItems: 100
          type: array
        macAddress:
          description: |
            Represents a MAC address in IEEE 802 MAC/EUI-48, or EUI-64 form in one of the following formats:
              01:23:45:67:89:AB
              01:23:45:67:89:ab:cd:ef
              01-23-45-67-89-ab
              01-23-45-67-89-ab-cd-ef
              0123.4567.89ab
              0123.4567.89ab.cdef
              0123 4567 89ab cdEF
          example: 01:23:45:67:89:0A
          maxLength: 23
          pattern: "^([A-Fa-f0-9]{2}:){5}[A-Fa-f0-9]{2}$|^([A-Fa-f0-9]{2}:){7}[A-Fa-f0-9]{2}$|^([A-Fa-f0-9]{2}-){5}[A-Fa-f0-9]{2}$|^([A-Fa-f0-9]{2}-){7}[A-Fa-f0-9]{2}$|^([A-Fa-f0-9]{4}\\\
            .){2}[A-Fa-f0-9]{4}$|^([A-Fa-f0-9]{4}\\.){3}[A-Fa-f0-9]{4}$|^([A-Fa-f0-9]{4}\
            \ ){3}[A-Fa-f0-9]{4}$"
          type: string
      type: object
