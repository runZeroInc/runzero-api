openapi: 3.0.0
info:
  contact:
    email: support@runzero.com
  description: "runZero API. API use is rate limited, you can make as many calls per\
    \ day as you have licensed assets."
  license:
    name: Commercial
    url: https://www.runzero.com/legal/terms
  title: runZero API
  version: 4.0.250826.0
servers:
- description: runZero Console
  url: https://console.runzero.com/api/v1.0
security:
- bearerAuth: []
- oauthDefaults: []
tags:
- description: "Requires Account key (starts with CT), or OAuth"
  name: Account
- description: "Requires Organization key (starts with OT), Account key (starts with\
    \ CT), or OAuth"
  name: Organization
- description: "Requires Export token (starts with ET), Organization key (starts with\
    \ OT), Account key (starts with CT), or OAuth"
  name: Export
- description: "Requires Organization key (starts with OT), Account key (starts with\
    \ CT), or OAuth"
  name: Import
- description: Unauthenticated
  name: Public
paths:
  /releases/agent/version:
    get:
      operationId: getLatestAgentVersion
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComponentVersion"
          description: component version
      security: []
      summary: Returns latest agent version
      tags:
      - Public
  /releases/scanner/version:
    get:
      operationId: getLatestScannerVersion
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComponentVersion"
          description: component version
      security: []
      summary: Returns latest scanner version
      tags:
      - Public
  /releases/platform/version:
    get:
      operationId: getLatestPlatformVersion
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComponentVersion"
          description: component version
      security: []
      summary: Returns latest platform version
      tags:
      - Public
  /health:
    get:
      operationId: getHealthCheck
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthCheckResponse"
          description: health status and current version
      security: []
      summary: Returns a health check status (cloud and self-hosted)
      tags:
      - Public
  /import/org/{orgID}/assets:
    post:
      description: |
        Assets can be discovered, imported, and merged by runZero scan tasks, first-party integrations, and third-party
        defined custom integrations. See [/account/custom-integrations](#/account/getAccountCustomIntegrations). Currently only assets for custom integrations are importable here.
      operationId: importCustomIntegrationAssets
      parameters:
      - description: The ID of the organization to import the assets into
        explode: false
        in: path
        name: orgID
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      requestBody:
        content:
          multipart/form-data:
            encoding:
              assetData:
                contentType: application/gzip
                style: form
            schema:
              $ref: "#/components/schemas/NewAssetImport"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
          description: import task created. The task ID should be checked for its
            status.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Invalid request body
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Access token is missing or invalid
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Action not allowed for this license type
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Resource not found
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Invalid request body
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Unexpected error occurred on the server
      summary: Import assets described by a registered custom integration
      tags:
      - Import
  /export/org/assets.json:
    get:
      operationId: exportAssetsJSON
      parameters:
      - description: The current Organization
        explode: true
        in: query
        name: _oid
        required: false
        schema:
          type: string
        style: form
      - description: A search query in runZero search query syntax
        explode: true
        in: query
        name: search
        required: false
        schema:
          type: string
        style: form
      - description: "A list of fields to export, comma-separated"
        explode: true
        in: query
        name: fields
        required: false
        schema:
          type: string
        style: form
      - description: The number of results to return per request.
        explode: true
        in: query
        name: page_size
        required: false
        schema:
          type: integer
        style: form
      - description: The value to use for requesting the next page when requesting
          paginated results.  This should be the value of the `next_key` attribute
          returned in the previous response.
        explode: true
        in: query
        name: start_key
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/exportAssetsJSON_200_response"
          description: "Filtered asset results. <ul><li>When the `page_size` query\
            \ parameter is not set in the request, the response will be a JSON array\
            \ of assets.</li><li>When the `page_size` query parameter is present in\
            \ the request, the response will be an object with an assets array and\
            \ a `next_key` string for pagination.</li></ul>"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
          description: Access token is missing or invalid
      summary: Exports the asset inventory
      tags:
      - Export
