    NewAssetImport:
      description: |
        Represents a request to import asset data described by the specified custom integration into the specified site.

        Assets will be created new or merged according to merge rules defined by the version of the platform
        you are uploading the asset data file to. Typically, this involves matching network and other unique
        single or grouped properties.

        There is a maximum of 256 custom asset properties that can be applied to any asset. This means
        that, aside from the per-import asset property limit set on ImportAsset, if a new import sets
        different custom properties on the same asset, the new properties are combined with the
        pre-existing ones.
      properties:
        siteId:
          description: The ID of the site assets are to be imported into.
          example: e77602e0-3fb8-4734-aef9-fbc6fdcb0fa8
          format: uuid
          type: string
          x-go-type: uuid.UUID
          x-go-import:
            name: uuid
            path: github.com/gofrs/uuid
        customIntegrationId:
          description: The unique ID of the registered custom integration which produced
            the asset data. Uniqueness is not checked/enforced. See /account/custom-integrations
            api.
          example: e77602e0-3fb8-4734-aef9-fbc6fdcb0fa8
          format: uuid
          type: string
          x-go-type: uuid.UUID
          x-go-import:
            name: uuid
            path: github.com/gofrs/uuid
        importTask:
          $ref: "#/components/schemas/ImportTask"
        assetData:
          description: |
            A gzip (not .tar.gz) compressed file containing ImportAsset objects. The file data may be a JSON array of
            ImportAsset objects, e.g. [{},{},...] or JSONL format, with a single JSON representation of an ImportAsset
            object on each new line, e.g. {}\n{}\n...
          format: binary
          type: string
      required:
      - assetData
      - customIntegrationId
      - importTask
      - siteId
      type: object
    ImportAsset:
      description: Represents a custom asset to be created or merged after import.
      properties:
        id:
          description: Any value which can uniquely identify the asset within the
            custom integration.
          maxLength: 1024
          type: string
        runZeroID:
          description: The unique identifier of the runZero asset to merge into.
          example: e77602e0-3fb8-4734-aef9-fbc6fdcb0fa8
          format: uuid
          type: string
          x-go-type: uuid.UUID
          x-go-import:
            name: uuid
            path: github.com/gofrs/uuid
        networkInterfaces:
          description: The asset's networking configuration.
          items:
            $ref: "#/components/schemas/NetworkInterfaces_inner"
          maxItems: 256
          title: NetworkInterfaces
          type: array
        hostnames:
          description: "Represents hostnames the asset is assigned or reachable at.\
            \ These can be fully-qualified hostnames with the domain name, or a short\
            \ hostname."
          items:
            example: host.domain.com
            maxLength: 260
            type: string
          maxItems: 100
          type: array
        domain:
          description: Represents a single domain name which could be applied to all
            non-fqdns in the hostnames field.
          example: domain.com
          maxLength: 260
          type: string
        firstSeenTS:
          description: "Represents the earliest time the asset was seen by the custom\
            \ integration reporting it, using a date string as defined by RFC 3339,\
            \ section 5.6."
          example: 2023-03-06T18:14:50.52Z
          format: date-time
          type: string
        os:
          description: The name of the asset's operating system. It is advisable to
            keep the data clean by normalizing to existing values when possible.
          example: Ubuntu Linux 22.04
          maxLength: 1024
          type: string
        osVersion:
          description: The version of the asset's operating system. It is advisable
            to keep the data clean by normalizing to existing values when possible.
          example: "22.04"
          maxLength: 1024
          type: string
        manufacturer:
          description: The manufacturer of the operating system of the asset. It is
            advisable to keep the data clean by normalizing to existing values when
            possible.
          example: Apple Inc.
          maxLength: 1024
          type: string
        model:
          description: The hardware model of the asset. It is advisable to keep the
            data clean by normalizing to existing values when possible.
          example: Macbook Air
          maxLength: 1024
          type: string
        tags:
          description: Arbitrary string tags applied to the asset.
          example:
          - foo
          - key=value
          items:
            maxLength: 1024
            type: string
          maxItems: 100
          type: array
        deviceType:
          example: Desktop
          maxLength: 1024
          type: string
        customAttributes:
          additionalProperties:
            $ref: "#/components/schemas/CustomAttributes_value"
          description: "Flat map of arbitrary string key/value pairs representing\
            \ custom attribute data not described in properties above. Note the maximum\
            \ number of keys and length of values. Additionally, property names may\
            \ only be 256 characters long."
          maxProperties: 1024
          title: CustomAttributes
          type: object
      required:
      - id
      type: object
    AccessToken:
      example:
